---
layout: default
---

<article class="max-w-5xl mx-auto px-4 py-16">

  <!-- Back nav -->
  <a href="/" class="inline-flex items-center gap-2 text-[11px] font-mono font-semibold text-slate-400 hover:text-surf-600 uppercase tracking-widest mb-10 transition-colors group">
    <i data-feather="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i> Return to Home
  </a>

  <!-- Page Header -->
  <header class="mb-12 pb-10 border-b-2 border-slate-100">
    <div class="inline-flex items-center gap-2 px-3 py-1 bg-surf-50 border border-surf-200 text-surf-700 text-[10px] font-mono font-bold uppercase tracking-widest rounded mb-5">
      <span class="w-1.5 h-1.5 bg-surf-500 rounded-full animate-pulse"></span>
      Engineering Project
    </div>
    <h1 class="text-4xl md:text-5xl font-bold text-slate-900 leading-tight mb-5 tracking-tight">{{ page.title }}</h1>
    <p class="text-xl text-slate-500 font-light leading-relaxed max-w-2xl">{{ page.description }}</p>
  </header>

  <!-- Main Content + Sidebar -->
  <div class="flex flex-col lg:flex-row gap-16">

    <!-- Article Body -->
    <div class="flex-1 min-w-0 project-content">
      {{ content }}
    </div>

    <!-- Sidebar -->
    <aside class="w-full lg:w-56 shrink-0 space-y-6 lg:sticky lg:top-24 self-start">
      <div class="bg-slate-50 rounded-xl p-6 border border-slate-200">
        <h3 class="text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest mb-4">Relevant Skills</h3>
        <div class="flex flex-wrap gap-2">
          {% for tag in page.tags %}
          <span class="px-2.5 py-1 bg-white border border-slate-200 text-slate-700 text-[10px] font-mono font-bold uppercase rounded shadow-sm">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>

      {% if page.github_link %}
      <a href="{{ page.github_link }}" class="flex items-center justify-center w-full px-4 py-3 bg-slate-900 text-white text-xs font-mono font-bold hover:bg-surf-600 transition-colors rounded-lg">
        <i data-feather="github" class="w-4 h-4 mr-2"></i> VIEW CODE
      </a>
      {% endif %}

      <a href="/" class="flex items-center justify-center w-full px-4 py-3 bg-white border border-slate-200 text-slate-600 text-xs font-mono font-bold hover:border-surf-400 hover:text-surf-600 transition-colors rounded-lg">
        <i data-feather="grid" class="w-4 h-4 mr-2"></i> ALL PROJECTS
      </a>
    </aside>

  </div>
</article>

<style>
  /* ── Typography Base ── */
  .project-content {
    font-size: 1rem;
    line-height: 1.8;
    color: #334155;
  }

  /* ── Headings ── */
  .project-content h2 {
    font-family: 'JetBrains Mono', 'Menlo', monospace;
    font-size: 1.35rem;
    font-weight: 700;
    color: #0f172a;
    margin-top: 2.75rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #f1f5f9;
    letter-spacing: -0.01em;
  }

  .project-content h2:first-child {
    margin-top: 0;
  }

  .project-content h3 {
    font-family: 'JetBrains Mono', 'Menlo', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: #0d9488;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2rem;
    margin-bottom: 0.6rem;
  }

  /* ── Paragraphs ── */
  .project-content p {
    margin-bottom: 1.25rem;
    color: #475569;
  }

  /* ── Lists ── */
  .project-content ul,
  .project-content ol {
    margin: 1rem 0 1.5rem 0;
    padding-left: 1.5rem;
  }

  .project-content ul {
    list-style-type: none;
    padding-left: 0;
  }

  .project-content ul > li {
    position: relative;
    padding-left: 1.25rem;
    margin-bottom: 0.6rem;
    color: #475569;
  }

  .project-content ul > li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.65em;
    width: 6px;
    height: 6px;
    background: #14b8a6;
    border-radius: 50%;
  }

  /* Nested lists */
  .project-content ul ul {
    margin-top: 0.5rem;
    margin-bottom: 0;
  }

  .project-content ul ul > li::before {
    background: transparent;
    border: 1.5px solid #14b8a6;
  }

  /* ── Horizontal Rule ── */
  .project-content hr {
    border: none;
    border-top: 2px solid #f1f5f9;
    margin: 2.5rem 0;
  }

  /* ── Strong / Bold ── */
  .project-content strong {
    font-weight: 700;
    color: #0f172a;
  }

  /* ── Inline Code ── */
  .project-content code {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    padding: 0.15em 0.45em;
    border-radius: 4px;
    font-size: 0.85em;
    font-family: 'JetBrains Mono', monospace;
    color: #0d9488;
  }

  /* ── Images ── */
  .project-content img {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    margin: 1.5rem 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  /* ── Image captions (em after img) ── */
  .project-content img + em,
  .project-content p > em:only-child {
    display: block;
    text-align: center;
    font-size: 0.8rem;
    color: #94a3b8;
    font-style: italic;
    margin-top: -0.75rem;
    margin-bottom: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Video ── */
  .project-content video {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    margin: 1.5rem 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  /* ── Links ── */
  .project-content a {
    color: #0d9488;
    text-decoration: underline;
    text-decoration-color: #99f6e4;
    text-underline-offset: 2px;
    transition: color 0.15s;
  }

  .project-content a:hover {
    color: #134e4a;
  }

  /* ── Result / callout blocks ── */
  .project-content blockquote {
    border-left: 3px solid #14b8a6;
    background: #f0fdfa;
    margin: 1.5rem 0;
    padding: 1rem 1.25rem;
    border-radius: 0 8px 8px 0;
    color: #134e4a;
    font-size: 0.95rem;
  }

  /* ── Section result pill (for "Result:" bold text in lists) ── */
  .project-content li strong:first-child {
    display: inline-block;
    color: #0d9488;
  }
</style>
