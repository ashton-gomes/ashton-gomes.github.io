---
layout: default
---

<article class="max-w-5xl mx-auto px-4 py-16">

  <!-- Back nav -->
  <a href="/" class="inline-flex items-center gap-2 text-[11px] font-sans font-semibold text-slate-400 hover:text-surf-600 uppercase tracking-wider mb-10 transition-colors group">
    <i data-feather="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i> Return to Home
  </a>

  <!-- Page Header -->
  <header class="mb-12 pb-10 border-b-2 border-slate-100">
    <div class="inline-flex items-center gap-2 px-3 py-1 bg-surf-50 border border-surf-200 text-surf-700 text-xs font-sans font-semibold uppercase tracking-wider rounded mb-5">
      <span class="w-1.5 h-1.5 bg-surf-500 rounded-full animate-pulse"></span>
      Engineering Project
    </div>
    <h1 class="text-4xl md:text-5xl font-bold text-slate-900 leading-tight mb-5 tracking-tight">{{ page.title }}</h1>
    <p class="text-xl text-slate-500 font-light leading-relaxed max-w-2xl">{{ page.description }}</p>
  </header>

  <!-- Main Content + Sidebar -->
  <div class="flex flex-col lg:flex-row gap-16">

    <!-- Article Body -->
    <div class="flex-1 min-w-0 project-content">
      {{ content }}
    </div>

    <!-- Sidebar -->
    <aside class="w-full lg:w-64 shrink-0 space-y-6 lg:sticky lg:top-24 self-start">
      <div class="bg-slate-50 rounded-xl p-6 border border-slate-200">
        <h3 class="text-xs font-sans font-bold text-slate-500 uppercase tracking-wider mb-4">Relevant Skills</h3>
        <div class="flex flex-wrap gap-2">
          {% for tag in page.tags %}
          <span class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-sans font-semibold rounded shadow-sm">{{ tag }}</span>
          {% endfor %}
        </div>
      </div>

      {% if page.github_link %}
      <a href="{{ page.github_link }}" class="flex items-center justify-center w-full px-4 py-3 bg-slate-900 text-white text-sm font-sans font-semibold hover:bg-surf-600 transition-colors rounded-lg">
        <i data-feather="github" class="w-4 h-4 mr-2"></i> View Code
      </a>
      {% endif %}

      <a href="/" class="flex items-center justify-center w-full px-4 py-3 bg-white border border-slate-200 text-slate-600 text-sm font-sans font-semibold hover:border-surf-400 hover:text-surf-600 transition-colors rounded-lg">
        <i data-feather="grid" class="w-4 h-4 mr-2"></i> All Projects
      </a>
    </aside>

  </div>
</article>

<style>
  :root {
    --font-body: 'Segoe UI', 'Segoe UI Variable', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Consolas', 'Menlo', monospace;
    --color-body:    #1e293b;
    --color-muted:   #475569;
    --color-caption: #64748b;
    --color-heading: #0f172a;
    --color-accent:  #0d9488;
    --color-border:  #e2e8f0;
  }

  /* ── Base ── */
  .project-content {
    font-family: var(--font-body);
    font-size: 1.0625rem;
    line-height: 1.85;
    color: var(--color-body);
  }

  /* ── H2 section headers ── */
  .project-content h2 {
    font-family: 'Segoe UI', 'Segoe UI Variable', system-ui, -apple-system, BlinkMacSystemFont, sans-serif !important;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--color-heading);
    margin-top: 3rem;
    margin-bottom: 0.85rem;
    padding-bottom: 0.55rem;
    border-bottom: 2px solid #f1f5f9;
    letter-spacing: -0.01em;
    text-transform: none !important;
  }

  .project-content h2:first-child { margin-top: 0; }

  /* ── H3 sub-section headers ── */
  .project-content h3 {
    font-family: 'Segoe UI', 'Segoe UI Variable', system-ui, -apple-system, BlinkMacSystemFont, sans-serif !important;
    font-size: 1.2rem !important;
    font-weight: 700;
    color: var(--color-accent);
    text-transform: none !important;
    letter-spacing: normal !important;
    font-variant: normal !important;
    margin-top: 2.25rem;
    margin-bottom: 0.6rem;
  }

  /* ── Paragraphs ── */
  .project-content p {
    margin-bottom: 1.35rem;
    color: var(--color-body);
  }

  /* ── Lists ── */
  .project-content ul,
  .project-content ol {
    margin: 0.75rem 0 1.5rem 0;
    padding-left: 0;
    list-style: none;
  }

  .project-content ul > li {
    position: relative;
    padding-left: 1.4rem;
    margin-bottom: 0.7rem;
    color: var(--color-body);
    font-size: 1.0625rem;
  }

  .project-content ul > li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.68em;
    width: 7px;
    height: 7px;
    background: #14b8a6;
    border-radius: 50%;
  }

  .project-content ul ul {
    margin-top: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .project-content ul ul > li {
    font-size: 1rem;
    color: var(--color-muted);
  }

  .project-content ul ul > li::before {
    background: transparent;
    border: 2px solid #14b8a6;
    width: 6px;
    height: 6px;
  }

  /* ── HR ── */
  .project-content hr {
    border: none;
    border-top: 2px solid #f1f5f9;
    margin: 2.75rem 0;
  }

  /* ── Strong ── */
  .project-content strong {
    font-weight: 700;
    color: var(--color-heading);
  }

  /* ── Inline code — keep mono only here ── */
  .project-content code {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    padding: 0.15em 0.45em;
    border-radius: 4px;
    font-size: 0.875em;
    font-family: var(--font-mono);
    color: var(--color-accent);
  }

  /* ── Images ── */
  .project-content img {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    border: 1px solid var(--color-border);
    margin: 1.75rem 0 0.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    display: block;
  }

  /* ── Captions ── */
  .project-content img + em,
  .project-content video + em,
  .project-content p > em:only-child {
    display: block;
    text-align: center;
    font-size: 0.875rem;
    color: var(--color-caption);
    font-style: italic;
    font-family: var(--font-body);
    margin-top: 0.25rem;
    margin-bottom: 1.75rem;
    line-height: 1.5;
    padding: 0 1rem;
  }

  /* ── Video ── */
  .project-content video {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--color-border);
    margin: 1.75rem 0 0.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    display: block;
  }

  /* ── Links ── */
  .project-content a {
    color: var(--color-accent);
    text-decoration: underline;
    text-decoration-color: #99f6e4;
    text-underline-offset: 3px;
    transition: color 0.15s;
  }

  .project-content a:hover { color: #134e4a; }

  /* ── Blockquote ── */
  .project-content blockquote {
    border-left: 3px solid #14b8a6;
    background: #f0fdfa;
    margin: 1.5rem 0;
    padding: 1rem 1.25rem;
    border-radius: 0 8px 8px 0;
    color: #134e4a;
    font-size: 1rem;
  }

  /* ── Lead bold in list items ── */
  .project-content li strong:first-child {
    color: var(--color-accent);
  }

  /* ── Sidebar: Segoe UI throughout ── */
  aside,
  aside * {
    font-family: var(--font-body) !important;
  }
</style>

  .project-content tbody tr:last-child td {

  .project-content tbody tr:hover td {
