<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <!-- Fonts: IBM Plex Mono for labels/headings (Segoe UI used natively as body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surf: {
                          50: '#f0fdfa',
                          100: '#ccfbf1',
                          200: '#99f6e4',
                          300: '#5eead4',
                          500: '#14b8a6',
                          600: '#0d9488',
                          700: '#0f766e',
                          900: '#134e4a'
                        }
                    },
                    fontFamily: {
                        /* Segoe UI first — falls back gracefully on non-Windows */
                        sans: ['"Segoe UI"', '"Segoe UI Variable"', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['"IBM Plex Mono"', 'Consolas', 'Menlo', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        /* Engineering grid background */
        .bg-grid {
            background-size: 32px 32px;
            background-image:
                linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        ::selection { background-color: #99f6e4; color: #134e4a; }

        /* Base reading size */
        html { font-size: 16px; }
        body { font-size: 1rem; color: #1e293b; }

        /* Nav smooth scroll */
        nav { transition: box-shadow 0.2s; }
    </style>
</head>
<body class="bg-white text-slate-800 antialiased bg-grid flex flex-col min-h-screen">

    <!-- Navigation -->

        <div class="max-w-6xl mx-auto px-4 h-full flex justify-between items-center">
            <!-- Logo -->
            <a href="/" class="flex items-center gap-2.5 group no-underline">
                <div class="w-8 h-8 bg-surf-600 text-white flex items-center justify-center font-mono font-bold text-xs rounded-lg shadow-sm group-hover:bg-surf-900 transition-colors">AG</div>
                <span class="font-mono font-bold text-slate-900 tracking-tight text-sm">ASHTON.GOMES</span>
            </a>
            <!-- Links -->
            <div class="hidden md:flex items-center gap-8">
                <a href="/#about" class="text-[11px] font-mono font-semibold text-slate-500 hover:text-surf-600 uppercase tracking-widest transition-colors no-underline">Profile</a>
                <a href="/#projects" class="text-[11px] font-mono font-semibold text-slate-500 hover:text-surf-600 uppercase tracking-widest transition-colors no-underline">Projects</a>
                <a href="{{ site.resume_url }}" class="text-[11px] font-mono font-semibold text-slate-500 hover:text-surf-600 uppercase tracking-widest transition-colors no-underline">Resume</a>
                <a href="/cdn-cgi/l/email-protection#0b70702b78627f6e256e666a62672b7676" class="text-[11px] font-mono font-bold text-surf-700 border border-surf-300 px-3.5 py-1.5 rounded-lg hover:bg-surf-50 hover:border-surf-500 transition-all no-underline">
                    CONTACT
                </a>
            </div>
            <!-- Mobile hamburger placeholder (optional) -->
        </div>
    </nav>

    <main class="flex-grow pt-16">
        {{ content }}
    </main>

    <footer class="bg-white border-t border-slate-200 py-8 mt-16">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="w-5 h-5 bg-surf-600 text-white flex items-center justify-center font-mono font-bold text-[9px] rounded">AG</div>
                <p class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">Ashton Gomes · Mechanical Engineering</p>
            </div>
            <p class="text-[10px] font-mono text-slate-400">Built with Jekyll & Tailwind · {{ site.time | date: "%Y" }}</p>
        </div>
    </footer>
